<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form in HTML</title>
</head>
<body>

    <div>
    <label for="1"> Username : </label>
    <input type="text" placeholder="Enter a Name" id="1">
    </div>

    <div>
    <label for="2"> Password : </label>
    <input type="password" placeholder="Enter a password" id="2">
    </div>

    <div>
        <label for="3"> Age : </label>
        <input type="number" placeholder="Enter a age" id="3">
    </div>

    <form action="server">
        <button type="submit">click me</button>
    </form>

    <hr>
    <form action="server">
        <input type="text" name="affid" placeholder="Search in flipkart">
        <button type="submit">Search</button>

        <div>
            <input type="checkbox" id="1" name="age">
            <label for="1">I am 18+</label>
        </div>
        
        <div>
            Choose a Fruit : 
            <input type="radio" id="mango" name="Fruit">
            <label for="mango">Mango</label>
            <input type="radio" id="banana" name="Fruit">
            <label for="banana">Banana</label>
        </div>

        <div>
            Choose Your Subject : 
            <select name="subject" id="subject">
                <option value="">Choose Subject</option>
                <option value="math">Maths</option>
                <option value="sci">Science</option>
                <option value="eng">English</option>
            </select>
        </div>

        <div>
            <label for="5">Select Your Volume : </label>
            <input type="range" name="vol" id="5" min="20" max="200" step="20">
            
            <br>
            <label for="10"> Give Your feedback : </label>
            <textarea name="feedback" id="10" name="feedback" placeholder="Write ur feedback"></textarea>

            <button type="submit">Submit</button>
        </div>

    </form>

    <hr>

    <form action="data">
        <h2>Registration Form</h2>
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Last Name">

        <div>
            Please select gender
            <select name="gender" id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div>
            Do you agree to all terms of service ?
            <input type="checkbox" id="120" name="service">
            <label for="120">Yes, I agree</label>
        </div>

        <button type="submit">Register</button>
    </form>

    <hr>

    <form action="srv">
        <div>
            Name: 
                <input type="text" name="name" id="601">
        </div>
        <br>
        
        <div>
        sex: 
        <input type="radio" name="sex" id="602">
        <label for="602">Male</label>
        <input type="radio" name="sex" id="603">
        <label for="603">Female</label>
        </div>
        <br>

        <div>
            Country:
            <select name="Country" id="604">
                <option value="ind">India</option>
                <option value="usa">USA</option>
                <option value="chi">China</option>
                <option value="russ">Russia</option>
                <option value="other">Other</option>
            </select>
        </div>
        <br>

        Message:
        <div>
            <textarea name="Message" id="605" rows="4" cols="30" ></textarea>
        </div>
        <br>
        

        <div>
        <input type="checkbox" name="subscibe" id="606">
        <label for="606">Subscribe?</label>
        </div>
        <br>

        <button type="submit">Submit</button>
    </form>

    <hr>

    <form action="ggg">
        <h2>Feedback Form</h2>
        <br>
        <div>
            Name:
            <input type="text" name="name" id="901" placeholder="Write your name">
        </div>
        <br>
        
        <div>
            Email: 
            <input type="text" name="email" id="902" placeholder="Write your email">
        </div>
        <br>
        

        Message:
        <div>
            <textarea name="msg" id="904" rows="4" cols="30"></textarea>
        </div>
        <br>
        
        <div>
            Rate us our of 5:
            <br>
            <input type="radio" name="rate" id="911" value="911">
            <label for="911">1</label>
            <br>
            <input type="radio" name="rate" id="912" value="912">
            <label for="912">2</label>
            <br>
            <input type="radio" name="rate" id="913" value="913">
            <label for="913">3</label>
            <br>
            <input type="radio" name="rate" id="914" value="914">
            <label for="914">4</label>
            <br>
            <input type="radio" name="rate" id="915" value="915">
            <label for="915">5</label>
        </div>
        <br>

        <button type="submit">Send your message!</button>
    </form>
</body>
</html>
